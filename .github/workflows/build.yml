# AirPoint build pipeline.
#
# On any push: builds both platforms unsigned (used for sanity checks).
# On a tag push (v*): builds, signs, notarizes the Mac DMG, and publishes a release.
#
# REQUIRED REPO SECRETS for notarized releases (Settings -> Secrets -> Actions):
#
#   APPLE_CERTIFICATE_BASE64
#       Your Developer ID Application certificate (.p12), base64-encoded:
#           base64 -i DeveloperID.p12 | pbcopy
#   APPLE_CERTIFICATE_PASSWORD
#       The password you set when exporting the .p12 from Keychain Access.
#   APPLE_DEVELOPER_ID
#       Full identity name, e.g.: "Developer ID Application: Kavin Venkat (ABCDE12345)"
#   APPLE_ID
#       Your Apple ID email.
#   APPLE_TEAM_ID
#       10-character team ID from developer.apple.com membership page.
#   APPLE_APP_PASSWORD
#       App-specific password (appleid.apple.com -> Sign-In and Security ->
#       App-Specific Passwords). NOT your regular Apple ID password.
#   KEYCHAIN_PASSWORD
#       Any random string. Used only inside the CI runner's temporary keychain.
#
# REQUIRED REPO SECRETS for a signed Windows build (stops SmartScreen warnings
# and Windows Defender from quarantining the bundled DLLs). Uses Azure Trusted
# Signing (~$10/month, individual developers eligible) — see
# https://learn.microsoft.com/azure/trusted-signing/ :
#
#   AZURE_TENANT_ID, AZURE_CLIENT_ID, AZURE_CLIENT_SECRET
#       Credentials for an Azure service principal with the
#       "Trusted Signing Certificate Profile Signer" role.
#   AZURE_SIGNING_ENDPOINT
#       Your Trusted Signing account endpoint, e.g. https://eus.codesigning.azure.net
#   AZURE_SIGNING_ACCOUNT
#       The Trusted Signing account name.
#   AZURE_SIGNING_PROFILE
#       The certificate profile name within that account.
#
# If these secrets are absent the Windows build still works — it just ships
# unsigned, and users will hit SmartScreen / Defender warnings on first run.

name: Build AirPoint

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      # Mirrored from a secret so the signing step's `if:` can detect whether
      # signing is configured — the `secrets` context can't be used in `if:`,
      # but a job-level `env` value can.
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pillow

      - name: Generate .ico from PNG
        shell: bash
        run: |
          if [ -f assets/icon.png ]; then
            python -c "from PIL import Image; Image.open('assets/icon.png').save('assets/icon.ico', sizes=[(256,256),(128,128),(64,64),(48,48),(32,32),(16,16)])"
            echo "Generated assets/icon.ico"
          else
            echo "::warning::assets/icon.png not found - building without icon"
          fi

      - name: Build with PyInstaller
        run: pyinstaller AirPoint.spec --noconfirm

      # Self-contained-runtime guard. The frozen app must carry a COMPLETE VC++
      # runtime — without msvcp140.dll/concrt140.dll, OpenCV and MediaPipe fail
      # on any machine that lacks the VC++ Redistributable. Fail the build here
      # (where it's visible) rather than shipping a bundle that crashes on users.
      - name: Verify bundled C++ runtime is complete
        shell: bash
        run: |
          internal="dist/AirPoint/_internal"
          missing=0
          for dll in python310.dll msvcp140.dll vcruntime140.dll vcruntime140_1.dll concrt140.dll; do
            if [ -f "$internal/$dll" ]; then
              echo "ok: $dll"
            else
              echo "::error::missing required runtime DLL: $internal/$dll"
              missing=1
            fi
          done
          if [ "$missing" = "1" ]; then
            echo "Incomplete C++ runtime — see vcredist_binaries in AirPoint.spec"
            exit 1
          fi

      # Sign the .exe AND every bundled .dll/.pyd. Signing the whole folder is
      # what stops Windows Defender from quarantining individual files inside
      # _internal. Skipped automatically if the Azure secrets aren't set.
      - name: Sign Windows build
        if: startsWith(github.ref, 'refs/tags/v') && env.AZURE_CLIENT_ID != ''
        uses: azure/artifact-signing-action@v2
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ secrets.AZURE_SIGNING_ENDPOINT }}
          signing-account-name: ${{ secrets.AZURE_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ secrets.AZURE_SIGNING_PROFILE }}
          files-folder: dist/AirPoint
          files-folder-filter: exe,dll,pyd
          files-folder-recurse: true

      # Wrap the (signed, if configured) folder build into a single installer.
      # AirPoint-Setup.exe installs to a dedicated per-user folder with shortcuts,
      # so AirPoint.exe always stays next to _internal — this is what fixes the
      # "Failed to load Python DLL" error caused by running the loose exe.
      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build Windows installer
        shell: pwsh
        run: |
          $version = (Get-Content VERSION -Raw).Trim()
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "/DMyAppVersion=$version" "installer.iss"
          if ($LASTEXITCODE -ne 0) { throw "ISCC failed with exit code $LASTEXITCODE" }
          Get-ChildItem installer_out

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: AirPoint-Setup
          path: installer_out/AirPoint-Setup.exe

      - name: Upload Windows build
        uses: actions/upload-artifact@v4
        with:
          name: AirPoint-Windows
          path: dist/AirPoint/

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate .icns from PNG
        run: |
          if [ -f assets/icon.png ]; then
            ICONSET="assets/icon.iconset"
            mkdir -p "$ICONSET"
            sips -z 16 16     assets/icon.png --out "$ICONSET/icon_16x16.png"
            sips -z 32 32     assets/icon.png --out "$ICONSET/icon_16x16@2x.png"
            sips -z 32 32     assets/icon.png --out "$ICONSET/icon_32x32.png"
            sips -z 64 64     assets/icon.png --out "$ICONSET/icon_32x32@2x.png"
            sips -z 128 128   assets/icon.png --out "$ICONSET/icon_128x128.png"
            sips -z 256 256   assets/icon.png --out "$ICONSET/icon_128x128@2x.png"
            sips -z 256 256   assets/icon.png --out "$ICONSET/icon_256x256.png"
            sips -z 512 512   assets/icon.png --out "$ICONSET/icon_256x256@2x.png"
            sips -z 512 512   assets/icon.png --out "$ICONSET/icon_512x512.png"
            cp assets/icon.png "$ICONSET/icon_512x512@2x.png"
            iconutil -c icns "$ICONSET" -o assets/icon.icns
            echo "Generated assets/icon.icns"
          else
            echo "::warning::assets/icon.png not found - building without icon"
          fi

      - name: Build with PyInstaller
        run: pyinstaller AirPoint.spec --noconfirm

      - name: Import signing certificate
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 3600 build.keychain
          security import certificate.p12 -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/productsign
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" build.keychain
          rm certificate.p12

      - name: Sign app bundle (inner binaries then outer)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          APPLE_DEVELOPER_ID: ${{ secrets.APPLE_DEVELOPER_ID }}
        run: |
          APP="dist/AirPoint.app"
          ENT="scripts/entitlements.plist"
          # Sign every embedded dylib/.so first (inside-out is the safe order;
          # --deep is unreliable for PyInstaller bundles).
          find "$APP" -type f \( -name "*.dylib" -o -name "*.so" \) -print0 | \
            xargs -0 -I{} codesign --force --options runtime --timestamp \
              --sign "$APPLE_DEVELOPER_ID" "{}"
          # Sign any other Mach-O executables PyInstaller produced.
          find "$APP/Contents" -type f -perm +111 ! -name "*.dylib" ! -name "*.so" \
            ! -name "*.py" ! -name "*.txt" ! -name "*.json" -print0 2>/dev/null | \
            xargs -0 -I{} codesign --force --options runtime --timestamp \
              --sign "$APPLE_DEVELOPER_ID" "{}" 2>/dev/null || true
          # Sign the .app bundle itself with entitlements.
          codesign --force --options runtime --timestamp \
            --entitlements "$ENT" \
            --sign "$APPLE_DEVELOPER_ID" "$APP"
          # Verify the signature is well-formed before notarizing.
          codesign --verify --deep --strict --verbose=2 "$APP"

      - name: Create DMG
        run: |
          hdiutil create -volname "AirPoint" -srcfolder dist/AirPoint.app \
            -ov -format UDZO AirPoint.dmg

      - name: Sign DMG
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          APPLE_DEVELOPER_ID: ${{ secrets.APPLE_DEVELOPER_ID }}
        run: codesign --force --sign "$APPLE_DEVELOPER_ID" --timestamp AirPoint.dmg

      - name: Notarize and staple DMG
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          xcrun notarytool submit AirPoint.dmg \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --wait
          xcrun stapler staple AirPoint.dmg
          # Final sanity check that Gatekeeper will accept it.
          spctl -a -t open --context context:primary-signature -v AirPoint.dmg

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: AirPoint-macOS
          path: AirPoint.dmg

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download Windows build
        uses: actions/download-artifact@v4
        with:
          name: AirPoint-Windows
          path: AirPoint-Windows

      - name: Download macOS DMG
        uses: actions/download-artifact@v4
        with:
          name: AirPoint-macOS

      - name: Download Windows installer
        uses: actions/download-artifact@v4
        with:
          name: AirPoint-Setup
          path: .

      - name: Zip Windows build
        run: cd AirPoint-Windows && zip -r ../AirPoint-Windows.zip .

      # AirPoint-Setup.exe is the primary Windows download (the website links to
      # it). AirPoint-Windows.zip stays for the in-app auto-updater and power users.
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            AirPoint-Setup.exe
            AirPoint-Windows.zip
            AirPoint.dmg
          generate_release_notes: true
